---
driver:
  name: vagrant

provisioner:
  name: cinc_infra
  multiple_converge: 2
  enforce_idempotency: true
  deprecations_as_errors: true
  chef_license: accept-no-persist
  policyfile: Policyfile.rb

verifier:
  name: inspec

x-verifiers:
  default: &default_verifier
    inspec_tests:
      - path: test/integration/default

platforms:
  - name: almalinux-8
  - name: almalinux-9
  - name: almalinux-10
  - name: amazonlinux-2023
  - name: centos-stream-9
  - name: centos-stream-10
  - name: debian-12
  - name: debian-13
  - name: fedora-latest
  - name: opensuse-leap-15
  - name: opensuse-leap-16
  - name: oraclelinux-8
  - name: oraclelinux-9
  - name: rockylinux-8
  - name: rockylinux-9
  - name: rockylinux-10
  - name: ubuntu-20.04
  - name: ubuntu-22.04
  - name: ubuntu-24.04
  - name: ubuntu-26.04
  - name: freebsd-14
  - name: windows-2022
    driver:
      box: stromweld/windows-2022
      cpus: 4
      memory: 4096
    # The chocolatey resource is not idempotent (upstream issue), so converge
    # once and skip the idempotency check on Windows only.
    provisioner:
      multiple_converge: 1
      enforce_idempotency: false

suites:
  - name: default
    provisioner:
      named_run_list: default
    verifier: *default_verifier
