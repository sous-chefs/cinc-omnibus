---
driver: { name: exec }
transport: { name: exec }

platforms:
  - name: freebsd-latest
  - name: macos-latest
  - name: windows-latest
    # The chocolatey resource is not idempotent (upstream issue), so converge
    # once and skip the idempotency check on Windows only.
    provisioner:
      multiple_converge: 1
      enforce_idempotency: false
